repos:
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        args: [--in-place]
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.2
    hooks:
      - id: clang-format
  - repo: local
    hooks:
      - id: library-roots-hold-folders-only
        name: library roots hold folders only
        entry: python scripts/check_library_roots.py
        language: system
        pass_filenames: false
        always_run: true
